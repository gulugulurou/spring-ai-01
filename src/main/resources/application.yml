spring:
  profiles:
    active: local
  ai:
    dashscope:
      chat:
        options:
          model: qwen-plus
    vectorstore:
      pgvector:
        index-type: HNSW
        dimensions: 1536
        distance-type: COSINE_DISTANCE
        max-document-batch-size: 10000 # Optional: Maximum number of documents per batch
  datasource:
    url: jdbc:postgresql://localhost:5432/mydb
    username: root
    password: root
    driver-class-name: org.postgresql.Driver
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: gemma3:1b
# knife4j???????????????
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.wanan.demo_260401.controller

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: debug